<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --input-focus: #4F46E5;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-top: 0;
            font-size: 1.875rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(to right, var(--primary), #818CF8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background-color: white;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .error-message {
            color: #EF4444;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            display: block;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2 th:text="${isUpdate} ? 'Update Staff' : 'Add New Staff'">Add New Staff</h2>

        <form th:object="${addnewstaff}" method="post" th:action="@{/dataSubmitForm}">
            <div class="form-group">
                <label for="name">Full Name</label>
                <span class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                <input type="text" id="name" placeholder="John Doe" th:field="*{name}">
            </div>

            <div class="form-group">
                <label for="title">Job Title</label>
                <span class="error-message" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                <input type="text" id="title" placeholder="Lead Developer" th:field="*{title}">
            </div>

            <div class="form-group">
                <label for="salary">Monthly Salary</label>
                <span class="error-message" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></span>
                <input type="text" id="salary" placeholder="5000" th:field="*{salary}">
            </div>

            <div class="form-group">
                <input type="hidden" id="id" placeholder="123456789" th:field="*{id}">
            </div>

            <a th:href="@{/staffdetails}" role="button">Staff Details</a>

            <button type="submit" th:text="${isUpdate} ? 'Update Staff' : 'Add New Staff'">Add New Staff</button>
        </form>

        <div class="footer">
            &copy; 2026 AMB Staff Management
        </div>
    </div>
</body>

</html>
